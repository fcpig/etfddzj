<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>大道至简 · 均衡配置 Demo</title>
    <style>
      :root {
        --ink: #050505;
        --muted: #7a7a80;
        --soft: #f6f6f8;
        --line: #ededf1;
        --purple: #7b00e6;
        --purple-2: #a759ff;
        --green: #18c76b;
        --red: #f04b28;
        --mint: #e9fff5;
        --pink: #fff0f0;
        --blue-wash: #eef7ff;
        --violet-wash: #f4e7ff;
        --shadow: 0 12px 38px rgba(90, 50, 160, 0.12);
      }

      * { box-sizing: border-box; }

      html,
      body { height: 100%; }

      body {
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        color: var(--ink);
        background: #f1f2f5;
        font-family: "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      }

      button,
      input { font: inherit; }

      button {
        border: 0;
        background: none;
        color: inherit;
        cursor: pointer;
      }

      .phone {
        position: relative;
        width: min(430px, 100vw);
        height: min(932px, 100vh);
        overflow: hidden;
        background: #fff;
        box-shadow: 0 30px 90px rgba(18, 20, 35, .18);
      }

      .screen {
        position: absolute;
        inset: 0;
        display: none;
        overflow-y: auto;
        padding: 18px 22px 108px;
        background: #fff;
        scrollbar-width: none;
      }

      .screen::-webkit-scrollbar { display: none; }
      .screen.active { display: block; animation: rise .24s ease both; }

      .statusbar {
        height: 38px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 8px;
        font-size: 16px;
        font-weight: 900;
      }

      .status-icons {
        display: flex;
        align-items: center;
        gap: 6px;
        color: #222;
      }

      .status-icons svg {
        width: 17px;
        height: 17px;
        stroke-width: 2.8;
      }

      .battery {
        min-width: 30px;
        display: inline-grid;
        place-items: center;
        padding: 2px 6px;
        border-radius: 8px;
        background: linear-gradient(90deg, #ff9c16, #ffd05d);
        color: #fff;
        font-size: 12px;
        font-weight: 950;
      }

      .topbar,
      .page-head {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-top: 30px;
      }

      .page-head.single-right {
        justify-content: space-between;
      }

      .page-head h1 {
        margin: 0;
        margin-right: auto;
        font-size: 30px;
        line-height: 1.08;
        font-weight: 950;
      }

      .center-head {
        justify-content: space-between;
      }

      .center-head h1 {
        margin-right: 0;
      }

      .icon-btn {
        width: 42px;
        height: 42px;
        display: inline-grid;
        place-items: center;
        border-radius: 12px;
      }

      .icon-btn.dark {
        background: #000;
        color: #fff;
      }

      .icon-btn svg {
        width: 30px;
        height: 30px;
        stroke-width: 2.6;
      }

      .mini-logo {
        width: 42px;
        height: 42px;
        object-fit: contain;
        filter: drop-shadow(0 9px 10px rgba(128, 41, 234, .28));
      }

      .search-row {
        height: 58px;
        display: grid;
        grid-template-columns: 1fr auto auto;
        align-items: center;
        gap: 14px;
        margin: 42px 0 30px;
        padding: 8px 14px;
        border-radius: 28px;
        background: var(--soft);
      }

      .search-row .icon-btn:first-child { justify-self: start; }

      .hero h1 {
        margin: 0;
        font-size: 34px;
        line-height: 1.18;
        font-weight: 950;
      }

      .hero p {
        margin: 14px 0 18px;
        font-size: 18px;
        line-height: 1.45;
        font-weight: 900;
      }

      .mascot {
        height: 230px;
        display: grid;
        place-items: center;
      }

      .mascot img {
        width: 218px;
        height: 218px;
        object-fit: contain;
        transform: rotate(-7deg) scale(1.12);
      }

      .btn {
        min-height: 56px;
        border-radius: 30px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 0 18px;
        font-size: 18px;
        font-weight: 950;
      }

      .btn.full { width: 100%; }

      .btn.primary {
        color: #fff;
        background: linear-gradient(90deg, #7800e8, #8500ef);
      }

      .btn.soft {
        color: #8a35e6;
        background: linear-gradient(90deg, #e4efff, #f4dcff);
      }

      .btn.outline {
        color: #7920d7;
        background: #fff;
        border: 1.5px solid #c79cf4;
      }

      .btn svg {
        width: 21px;
        height: 21px;
        stroke-width: 2.8;
      }

      .section {
        margin-top: 30px;
      }

      .section h2 {
        margin: 0 0 18px;
        font-size: 26px;
        font-weight: 950;
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .section-head h2 { margin: 0; }
      .muted { color: var(--muted); }

      .summary-card {
        padding: 20px;
        border-radius: 18px;
        background: linear-gradient(105deg, #ffe9ff, #e9fbff 48%, #f7f7ff);
        box-shadow: var(--shadow);
      }

      .summary-row {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
      }

      .summary-row span,
      .metric span {
        display: block;
        color: var(--muted);
        font-size: 13px;
        font-weight: 850;
      }

      .summary-row b,
      .metric b {
        display: block;
        margin-top: 6px;
        font-size: 22px;
        font-weight: 950;
      }

      .summary-card p {
        margin: 18px 0 0;
        font-size: 15px;
        line-height: 1.65;
        font-weight: 800;
      }

      .signal {
        width: 100%;
        min-height: 74px;
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 12px;
        margin-top: 14px;
        padding: 18px 20px;
        border-radius: 10px;
        text-align: left;
        font-size: 18px;
        font-weight: 950;
      }

      .signal.green { color: var(--green); background: var(--mint); }
      .signal.red { color: var(--red); background: var(--pink); }
      .signal .go {
        width: 38px;
        height: 28px;
        display: inline-grid;
        place-items: center;
        border-radius: 18px;
        color: #fff;
        background: currentColor;
      }
      .signal .go svg { color: #fff; width: 18px; height: 18px; }

      .tabs,
      .sub-tabs {
        display: flex;
        gap: 20px;
        margin-top: 28px;
        overflow-x: auto;
        scrollbar-width: none;
      }

      .tabs::-webkit-scrollbar,
      .sub-tabs::-webkit-scrollbar { display: none; }

      .tabs button {
        min-width: 0;
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 950;
        white-space: nowrap;
      }

      .tabs .active {
        color: #fff;
        background: linear-gradient(90deg, #7800e8, #8500ef);
      }

      .sub-tabs {
        justify-content: space-between;
        gap: 18px;
        margin-top: 18px;
      }

      .sub-tabs button {
        color: #777;
        font-size: 18px;
        font-weight: 950;
        white-space: nowrap;
      }

      .sub-tabs .active { color: #000; }

      .template-list,
      .asset-list,
      .notice-list {
        display: grid;
        gap: 16px;
      }

      .account-switch {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        margin: 14px 0 16px;
      }

      .account-switch button {
        min-height: 42px;
        border-radius: 12px;
        background: #f5f5f8;
        color: #555;
        font-size: 14px;
        font-weight: 950;
      }

      .account-switch .active {
        color: #fff;
        background: linear-gradient(90deg, #7800e8, #8500ef);
      }

      .panel-copy {
        color: #222;
        line-height: 1.65;
        font-size: 15px;
        font-weight: 800;
      }

      .panel-copy .muted { font-size: 14px; }

      .template-card {
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 18px;
        text-align: left;
        background: linear-gradient(100deg, #fff2ff, #eef8ff);
        box-shadow: 0 8px 22px rgba(40, 36, 60, .04);
      }

      .template-card.active {
        border-color: #b98cff;
        box-shadow: 0 0 0 2px rgba(123, 0, 230, .10), var(--shadow);
      }

      .template-card h3 {
        margin: 0 0 8px;
        font-size: 20px;
        font-weight: 950;
      }

      .template-card p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
        font-weight: 800;
      }

      .template-card .meta {
        margin-top: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        padding: 6px 10px;
        border-radius: 999px;
        background: #f5f3ff;
        color: #6c35c5;
        font-size: 12px;
        font-weight: 900;
      }

      .asset-row {
        padding: 16px 0 18px;
        border-bottom: 1px solid var(--line);
      }

      .asset-top {
        display: grid;
        grid-template-columns: 48px 1fr auto;
        align-items: center;
        gap: 14px;
      }

      .ticker {
        width: 48px;
        height: 48px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        color: #fff;
        background: #315fdd;
        font-size: 20px;
        font-weight: 950;
      }

      .ticker.gold { background: #e4a22b; }
      .ticker.green { background: #19b96b; }
      .ticker.purple { background: #7b00e6; }

      .asset-top h3 {
        margin: 0;
        font-size: 18px;
        font-weight: 950;
      }

      .asset-top p {
        margin: 3px 0 0;
        color: var(--muted);
        font-size: 14px;
        font-weight: 800;
      }

      .pct {
        color: var(--purple);
        font-size: 20px;
        font-weight: 950;
      }

      input[type="range"] {
        width: 100%;
        margin-top: 14px;
        accent-color: var(--purple);
      }

      .total-bar {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(255,255,255,.96);
        box-shadow: 0 8px 26px rgba(0,0,0,.08);
      }

      .total-bar strong {
        display: block;
        font-size: 20px;
        font-weight: 950;
      }

      .total-bar span {
        color: var(--muted);
        font-size: 13px;
        font-weight: 850;
      }

      .total-bar .btn {
        min-height: 44px;
        min-width: 118px;
        font-size: 16px;
      }

      .save-card {
        display: grid;
        gap: 14px;
        padding: 16px;
        border-radius: 18px;
        background: linear-gradient(100deg, #fff6ff, #f4f9ff);
        border: 1px solid var(--line);
      }

      .save-card h3 {
        margin: 0;
        font-size: 20px;
        font-weight: 950;
      }

      .save-note {
        margin: 0;
        color: #555;
        line-height: 1.65;
        font-size: 15px;
        font-weight: 750;
      }

      .save-result {
        padding: 14px;
        border-radius: 16px;
        background: #fff;
        border: 1px solid var(--line);
      }

      .save-result strong {
        display: block;
        font-size: 18px;
        font-weight: 950;
      }

      .save-result p {
        margin: 6px 0 0;
        color: #555;
        line-height: 1.6;
        font-size: 14px;
        font-weight: 750;
      }

      .analysis-card,
      .notice-card,
      .metric-card {
        padding: 18px;
        border-radius: 18px;
        background: #fff;
        border: 1px solid var(--line);
        box-shadow: 0 10px 24px rgba(33, 23, 62, .05);
      }

      .analysis-card h3,
      .notice-card h3 {
        margin: 0 0 10px;
        font-size: 20px;
        font-weight: 950;
      }

      .analysis-card p,
      .notice-card p {
        margin: 0;
        color: #555;
        line-height: 1.68;
        font-size: 15px;
        font-weight: 750;
      }

      .ai-strip {
        width: 100%;
        margin: 14px 0;
        padding: 14px 18px;
        border-radius: 18px;
        text-align: left;
        background: linear-gradient(90deg, #d6fff3, #fff);
        font-size: 17px;
        font-weight: 950;
      }

      .chart-panel {
        padding: 18px 0 4px;
      }

      canvas {
        width: 100%;
        height: 260px;
        display: block;
      }

      .time-tabs {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 10px;
      }

      .bench-tabs {
        display: flex;
        gap: 8px;
        margin-top: 12px;
        flex-wrap: wrap;
      }

      .bench-tabs button {
        padding: 8px 12px;
        border-radius: 10px;
        background: #f5f5f8;
        color: #777;
        font-size: 13px;
        font-weight: 950;
        white-space: nowrap;
      }

      .bench-tabs button.active {
        color: #fff;
        background: linear-gradient(90deg, #7800e8, #8500ef);
      }

      .bench-info {
        margin-top: 10px;
        padding: 10px 14px;
        border-radius: 12px;
        background: #f6f6f8;
        font-size: 14px;
        font-weight: 900;
      }

      .time-tabs button {
        min-width: 54px;
        padding: 12px 8px;
        border-radius: 10px;
        color: #b4b4b8;
        font-size: 18px;
        font-weight: 950;
      }

      .time-tabs .active {
        color: #000;
        background: var(--soft);
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 18px;
      }

      .metric {
        padding: 14px 12px;
        border-radius: 14px;
        background: var(--soft);
      }

      .rules {
        display: grid;
        gap: 14px;
      }

      .rule {
        min-height: 64px;
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 12px;
        padding: 12px 0;
        border-bottom: 1px solid var(--line);
      }

      .rule strong {
        display: block;
        font-size: 18px;
        font-weight: 950;
      }

      .rule span {
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      .switch {
        width: 50px;
        height: 30px;
        padding: 3px;
        border-radius: 99px;
        background: #e3e3e8;
        cursor: pointer;
      }

      .switch::before {
        content: "";
        display: block;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 2px 6px rgba(0,0,0,.15);
        transition: transform .2s ease;
      }

      .switch.on {
        background: linear-gradient(90deg, #7800e8, #8500ef);
      }

      .switch.on::before { transform: translateX(20px); }

      .notice-card .meta {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
        color: #999;
        font-size: 15px;
        font-weight: 900;
      }

      .flame { color: var(--purple); }

      .import-box {
        min-height: 210px;
        display: grid;
        place-items: center;
        padding: 24px;
        border: 2px dashed #d8c8f3;
        border-radius: 22px;
        background: linear-gradient(120deg, #fff, #fbf7ff);
        text-align: center;
      }

      .import-box i {
        width: 62px;
        height: 62px;
        display: grid;
        place-items: center;
        margin: 0 auto 14px;
        border-radius: 18px;
        color: #7b00e6;
        background: #f4e9ff;
      }

      .import-box i svg {
        width: 34px;
        height: 34px;
      }

      .import-box h2 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      .import-box p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.55;
        font-weight: 800;
      }

      .builder-savebar {
        position: absolute;
        left: 18px;
        right: 18px;
        bottom: 96px;
        z-index: 7;
        padding: 14px 16px;
        border-radius: 22px;
        background: rgba(255,255,255,.98);
        box-shadow: 0 14px 32px rgba(0,0,0,.10);
      }

      .builder-savebar .btn {
        width: 100%;
        min-height: 52px;
        font-size: 17px;
      }

      .bottom-nav {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 8;
        height: 86px;
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        align-items: center;
        padding: 8px 10px 14px;
        background: rgba(255,255,255,.95);
        box-shadow: 0 -10px 24px rgba(0,0,0,.04);
      }

      .bottom-nav button {
        display: grid;
        justify-items: center;
        gap: 4px;
        color: #767676;
        font-size: 13px;
        font-weight: 900;
      }

      .bottom-nav svg {
        width: 28px;
        height: 28px;
        stroke-width: 2.4;
      }

      .bottom-nav .active { color: #000; }
      .bottom-nav .active svg {
        padding: 5px;
        border-radius: 8px;
        background: #000;
        color: #fff;
      }

      .home-indicator {
        position: absolute;
        left: 50%;
        bottom: 7px;
        z-index: 9;
        width: 148px;
        height: 5px;
        border-radius: 99px;
        background: #4b4b4d;
        transform: translateX(-50%);
      }

      @keyframes rise {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @media (max-width: 430px) {
        .phone { width: 100vw; height: 100vh; box-shadow: none; }
        .screen { padding-inline: 20px; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
                <script>
const {
  useState,
  useEffect,
  useRef,
  useMemo,
  useCallback
} = React;

/* ============ 组合走势计算 ============ */
// 将 ETF_DATA 的 [[date, value], ...] 转为 map 并在统一日期轴上前向填充
function buildAlignedSeries(holdings) {
  const dates = ETF_DATA.dates;
  const weighted = holdings.filter(h => h.weight > 0 && ETF_DATA.series[h.ticker]).map(h => {
    const raw = ETF_DATA.series[h.ticker];
    const map = new Map(raw);
    // 先把每个资产映射到统一日期轴
    let lastVal = null;
    const aligned = dates.map(d => {
      if (map.has(d)) lastVal = map.get(d);
      return lastVal;
    });
    // 归一化为 100 起点（只保留起点之后有效的部分）
    const firstIdx = aligned.findIndex(v => v != null);
    if (firstIdx < 0) return null;
    const base = aligned[firstIdx];
    const norm = aligned.map(v => v == null ? null : v / base * 100);
    return {
      norm,
      weight: h.weight,
      firstIdx
    };
  }).filter(Boolean);
  if (!weighted.length) return {
    dates,
    series: []
  };

  // 所有资产都开始后的共同起点
  const startIdx = Math.max(...weighted.map(w => w.firstIdx));
  // 加权合成
  const series = [];
  for (let i = startIdx; i < dates.length; i++) {
    let sum = 0;
    let total = 0;
    weighted.forEach(w => {
      const v = w.norm[i];
      if (v != null) {
        sum += v * w.weight;
        total += w.weight;
      }
    });
    if (total > 0) series.push({
      date: dates[i],
      value: sum / total
    });
  }
  return {
    dates: series.map(p => p.date),
    series: series.map(p => p.value)
  };
}
